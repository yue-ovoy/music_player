<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知欧尼</title>
    <meta name="theme-color" content="#c95169" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="知欧尼" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.jpg" />
    <link rel="stylesheet" href="./styles.css?v=20260523-post-image-viewer" />
    <script src="./config.js"></script>
    <script type="module" src="./app.js?v=20260523-post-image-viewer"></script>
  </head>
  <body>
    <main class="shell">
      <section class="intro" aria-label="应用操作">
        <button class="profile-button" id="profile-button" type="button" aria-label="用户资料">
          <img id="profile-avatar" alt="" />
          <span id="profile-name">水水</span>
        </button>
        <div class="intro-actions">
          <button class="install-button" id="install-app-button" type="button" hidden>安装</button>
          <button class="story-button" id="posts-button" type="button" title="动态" aria-label="动态">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h9l5 5v11H5z"></path>
              <path d="M14 4v5h5"></path>
              <path d="m8 16 1.2-3.4L17 4.8a1.5 1.5 0 0 1 2.1 2.1l-7.8 7.8L8 16z"></path>
              <path d="M8 20h8"></path>
            </svg>
          </button>
          <button class="message-button" id="message-button" type="button" title="消息" aria-label="消息">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
            </svg>
            <span class="message-badge" id="message-badge" hidden>0</span>
          </button>
          <button class="update-button" id="force-update-button" type="button" title="强制更新" aria-label="强制更新">↻</button>
        </div>
      </section>

      <section class="install-tip" id="install-tip" hidden>
        <span id="install-tip-text">点浏览器菜单，选择“添加到主屏幕”或“安装应用”。</span>
        <button class="ghost-button compact" id="close-install-tip" type="button">知道了</button>
      </section>

      <section class="panel profile-panel" id="profile-panel" hidden>
        <div class="section-bar">
          <h3>用户资料</h3>
          <button class="ghost-button" id="close-profile-button" type="button">关闭</button>
        </div>
        <p class="profile-hint" id="profile-hint" hidden>先选一下你是谁，这台设备以后会记住。</p>

        <div class="profile-switch" role="group" aria-label="选择用户">
          <button class="profile-option active" data-profile-id="shuishui" type="button">水水</button>
          <button class="profile-option" data-profile-id="zhi" type="button">知</button>
        </div>

        <label class="field">
          <span>用户名</span>
          <input id="profile-display-name" type="text" maxlength="24" />
        </label>

        <label class="field">
          <span>头像</span>
          <input id="profile-avatar-file" type="file" accept="image/*" />
        </label>

        <div class="avatar-cropper" id="avatar-cropper" hidden>
          <div class="avatar-crop-frame" id="avatar-crop-frame">
            <img id="avatar-crop-image" alt="" draggable="false" />
          </div>
          <p class="avatar-crop-status" id="avatar-crop-status">图片读取中...</p>
          <label class="range-field">
            <span>缩放</span>
            <input id="avatar-zoom" type="range" min="1" max="3" step="0.01" value="1" />
          </label>
        </div>

        <button class="primary-button" id="save-profile-button" type="button">保存资料</button>
      </section>

      <section class="panel chat-panel" id="chat-panel" hidden>
        <div class="section-bar chat-topbar">
          <button class="ghost-button" id="close-chat-button" type="button">返回</button>
          <h3 id="chat-title">知</h3>
          <span aria-hidden="true"></span>
        </div>
        <div class="chat-list" id="chat-list" aria-live="polite"></div>
        <form class="chat-form" id="chat-form">
          <input id="chat-input" type="text" maxlength="500" placeholder="写点什么给她" autocomplete="off" />
          <button class="secondary-button compact" id="send-message-button" type="submit">发送</button>
        </form>
        <p class="chat-status" id="chat-status"></p>
      </section>

      <section class="panel posts-panel" id="posts-panel" hidden>
        <div class="section-bar chat-topbar">
          <button class="ghost-button" id="close-posts-button" type="button">返回</button>
          <h3>小记</h3>
          <span aria-hidden="true"></span>
        </div>

        <section class="post-composer" id="post-composer" hidden>
          <form class="post-form" id="post-form">
            <textarea id="post-body" maxlength="1000" placeholder="写一点今天想留下的事"></textarea>
            <label class="post-image-picker">
              <input id="post-image-file" type="file" accept="image/*" />
              <span>添加图片</span>
              <strong id="post-image-name"></strong>
            </label>
            <div class="post-form-actions">
              <button class="ghost-button" id="cancel-post-button" type="button">取消</button>
              <button class="primary-button" id="publish-post-button" type="submit">发布</button>
            </div>
          </form>
        </section>

        <p class="post-status" id="post-status"></p>
        <div class="post-list" id="post-list" aria-live="polite"></div>
        <button class="compose-post-button" id="compose-post-button" type="button" title="发布小记" aria-label="发布小记">+</button>
      </section>

      <div class="image-viewer" id="image-viewer" hidden>
        <button class="image-viewer-close" id="image-viewer-close" type="button" aria-label="关闭图片">×</button>
        <img id="image-viewer-img" alt="" />
      </div>

      <section class="workspace">
        <section class="main-panel">
          <div class="now-playing">
            <div class="record">
              <div class="record-core"></div>
            </div>
            <div class="track-copy">
              <p class="eyebrow">now playing</p>
              <h2 id="current-title">还没有播放歌曲</h2>
              <p id="current-meta">上传一首歌，或者从曲库点播放。</p>
            </div>
          </div>

          <div class="player-controls" aria-label="播放器控制">
            <button class="player-button" id="previous-button" type="button" title="上一首" aria-label="上一首" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 5v14"></path>
                <path d="m19 6-11 6 11 6V6z"></path>
              </svg>
            </button>
            <button class="player-button primary" id="play-toggle-button" type="button" title="播放" aria-label="播放" disabled>
              <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14l11-7-11-7z"></path>
              </svg>
              <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14"></path>
                <path d="M16 5v14"></path>
              </svg>
            </button>
            <button class="player-button" id="next-button" type="button" title="下一首" aria-label="下一首" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m5 6 11 6-11 6V6z"></path>
                <path d="M18 5v14"></path>
              </svg>
            </button>
          </div>

          <div class="progress-panel" aria-label="播放进度">
            <span id="current-time">0:00</span>
            <input id="progress-slider" type="range" min="0" max="100" step="0.1" value="0" aria-label="播放进度" disabled />
            <span id="duration-time">0:00</span>
          </div>

          <audio id="audio-player" controls preload="metadata"></audio>

          <div class="tabs" role="tablist" aria-label="音乐视图">
            <button class="tab active" data-view="library" type="button">曲库</button>
            <button class="tab" data-view="playlists" type="button">歌单</button>
          </div>

          <section class="view active" id="library-view" aria-label="曲库">
            <div class="section-bar library-bar">
              <div class="library-heading">
                <h3>共享曲库</h3>
                <span id="song-count">0 首</span>
              </div>
              <div class="library-actions">
                <div class="playback-actions" id="library-playback-actions" aria-label="曲库播放控制"></div>
                <button class="secondary-button compact" id="open-upload-button" type="button">上传歌曲</button>
              </div>
            </div>
            <div class="song-list" id="song-list"></div>
          </section>

          <section class="view" id="playlists-view" aria-label="歌单">
            <form class="playlist-form" id="playlist-form">
              <input id="playlist-name" type="text" maxlength="40" placeholder="新建歌单，比如 深夜散步" />
              <button class="secondary-button" type="submit">新建</button>
            </form>
            <div class="playlist-grid" id="playlist-grid"></div>
          </section>
        </section>
      </section>

      <section class="panel upload-page" id="upload-page" hidden>
        <div class="section-bar">
          <h3>上传歌曲</h3>
          <button class="ghost-button" id="back-to-library-button" type="button">返回曲库</button>
        </div>

        <label class="field">
          <span>歌手</span>
          <input id="artist-name" type="text" maxlength="60" placeholder="比如 林俊杰" />
        </label>

        <form class="upload-card" id="upload-form">
          <label class="dropzone" for="music-file">
            <input id="music-file" type="file" accept="audio/*,.wav,.mp3,.m4a,.flac" multiple />
            <strong>选择音乐文件</strong>
            <span>支持 wav / mp3 / m4a / flac</span>
          </label>
          <div class="selected-files" id="selected-files" aria-live="polite"></div>
          <button class="primary-button" type="submit">上传到曲库</button>
        </form>

        <div class="mode-note" id="mode-note">
          当前数据只保存在这台设备。配置 Supabase 后，你们两个人打开同一个链接就会共享曲库。
        </div>

        <button class="danger-button" id="clear-room-button" type="button">清空所有内容</button>
      </section>
    </main>
  </body>
</html>
