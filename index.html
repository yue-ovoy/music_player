<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>凡卡今天听歌了吗</title>
    <meta name="theme-color" content="#c95169" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="凡卡今天听歌了吗" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.jpg" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="intro" aria-labelledby="app-title">
        <div>
          <h1 id="app-title">凡卡今天听歌了吗</h1>
        </div>
        <div class="intro-actions">
          <button class="update-button" id="force-update-button" type="button" title="强制更新" aria-label="强制更新">↻</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel settings-panel">
          <label class="field">
            <span>你的名字</span>
            <input id="uploader-name" type="text" maxlength="24" placeholder="比如 Yue" />
          </label>

          <form class="upload-card" id="upload-form">
            <label class="dropzone" for="music-file">
              <input id="music-file" type="file" accept="audio/*,.wav,.mp3,.m4a,.flac" multiple />
              <strong>选择音乐文件</strong>
              <span>支持 wav / mp3 / m4a / flac</span>
            </label>
            <div class="selected-files" id="selected-files" aria-live="polite"></div>
            <button class="primary-button" type="submit">上传到曲库</button>
          </form>

          <div class="mode-note" id="mode-note">
            当前数据只保存在这台电脑。配置 Supabase 后，你们两个人打开同一个链接就会共享曲库。
          </div>

          <button class="danger-button" id="clear-room-button" type="button">清空所有内容</button>
        </aside>

        <section class="main-panel">
          <div class="now-playing">
            <div class="record">
              <div class="record-core"></div>
            </div>
            <div class="track-copy">
              <p class="eyebrow">now playing</p>
              <h2 id="current-title">还没有播放歌曲</h2>
              <p id="current-meta">上传一首歌，或者从曲库点播放。</p>
            </div>
          </div>

          <audio id="audio-player" controls preload="metadata"></audio>

          <div class="tabs" role="tablist" aria-label="音乐视图">
            <button class="tab active" data-view="library" type="button">曲库</button>
            <button class="tab" data-view="playlists" type="button">歌单</button>
          </div>

          <section class="view active" id="library-view" aria-label="曲库">
            <div class="section-bar">
              <h3>共享曲库</h3>
              <span id="song-count">0 首</span>
            </div>
            <div class="song-list" id="song-list"></div>
          </section>

          <section class="view" id="playlists-view" aria-label="歌单">
            <form class="playlist-form" id="playlist-form">
              <input id="playlist-name" type="text" maxlength="40" placeholder="新建歌单，比如 深夜散步" />
              <button class="secondary-button" type="submit">新建</button>
            </form>
            <div class="playlist-grid" id="playlist-grid"></div>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
